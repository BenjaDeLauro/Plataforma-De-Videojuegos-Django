{% extends 'base.html' %}

{% block contenido %}

<h2>Eliminar videojuego</h2>

<p>¿Seguro que querés eliminar el videojuego "{{ object.titulo }}"?</p>

<form method="post" class="formulario">
    {% csrf_token %}

    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'catalogo' %}" class="boton secundario">Cancelar</a>
</form>

{% endblock %}
