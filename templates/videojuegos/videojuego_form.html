{% extends 'base.html' %}

{% block contenido %}

<h2>Formulario de videojuego</h2>

<form method="post" enctype="multipart/form-data" class="formulario">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Guardar</button>
    <a href="{% url 'catalogo' %}" class="boton secundario">Cancelar</a>
</form>

{% endblock %}
