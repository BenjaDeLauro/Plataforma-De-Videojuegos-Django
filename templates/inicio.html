{% extends 'base.html' %}

{% block contenido %}
<section class="hero">
    <h2>Bienvenido a GameHub</h2>
    <p>Sistema de gestión de videojuegos desarrollado con Django.</p>

    {% if user.is_authenticated %}
        <p>Hola, {{ user.username }}.</p>
        <a class="boton" href="{% url 'videojuego_list' %}">Ver videojuegos</a>
    {% else %}
        <a class="boton" href="{% url 'login' %}">Iniciar sesión</a>
        <a class="boton secundario" href="{% url 'registro' %}">Registrarse</a>
    {% endif %}
</section>
{% endblock %}
